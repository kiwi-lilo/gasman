<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <title>蒲城县燃气企业摸排分布图</title>
    <!-- 针对手机端进行自适应优化 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- 引入 Leaflet 的 CSS 和 JS，使用 HTTPS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <!-- 引入 Leaflet 自定义 SVG 标记插件 (用于画菱形等形状) -->
    <script src="https://unpkg.com/leaflet-svg-icon@1.0.0/leaflet-svg-icon.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; }
        #map { height: 100%; width: 100%; }
        .leaflet-popup-content-wrapper { border-radius: 8px; }
        .popup-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .popup-status.visited { color: #1e8e3e; font-weight: bold; font-size: 14px; }
        .popup-status.unvisited { color: #d93025; font-weight: bold; font-size: 14px; }
        .popup-type { color: #666; font-size: 12px; margin-top: 5px; }
        
        /* 图例样式 */
        .info.legend {
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            font-size: 14px;
            line-height: 24px;
            color: #333;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .legend-icon { width: 20px; height: 20px; display: inline-block; margin-right: 8px; }
        .circle { border-radius: 50%; }
        .diamond { transform: rotate(45deg) scale(0.7); }
        .green-bg { background-color: #4CAF50; border: 1px solid #fff; }
        .red-bg { background-color: #F44336; border: 1px solid #fff; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([34.95, 109.58], 12);
        
        // 高德地图瓦片服务 (HTTPS)
        L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            subdomains: ['1', '2', '3', '4'],
            maxZoom: 18,
            attribution: '© 高德地图'
        }).addTo(map);

        // 创建自定义的 SVG 图标生成函数
        function createIcon(type, visited) {
            var color = visited ? '#4CAF50' : '#F44336'; // 绿 or 红
            var svgHtml = '';
            
            if (type === '天然气') {
                // 菱形
                svgHtml = `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                             <polygon points="12,2 22,12 12,22 2,12" fill="${color}" stroke="white" stroke-width="2"/>
                           </svg>`;
            } else {
                // 圆形
                svgHtml = `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                             <circle cx="12" cy="12" r="10" fill="${color}" stroke="white" stroke-width="2"/>
                           </svg>`;
            }
            
            return L.divIcon({
                html: svgHtml,
                className: 'custom-svg-icon',
                iconSize: [24, 24],
                iconAnchor: [12, 12],
                popupAnchor: [0, -12]
            });
        }

        // 注入数据
        var gasData = [{"name": "蒲城县凯利液化气有限责任公司", "lon": 109.6069, "lat": 34.93, "type": "液化气", "visited": false}, {"name": "蒲城县海豚液化气有限公司", "lon": 109.811, "lat": 34.956, "type": "液化气", "visited": false}, {"name": "蒲城县王家液化气站", "lon": 109.648, "lat": 35.05, "type": "液化气", "visited": false}, {"name": "蒲城县荆姚镇双龙燃气有限公司", "lon": 109.456, "lat": 34.898, "type": "液化气", "visited": false}, {"name": "陕西洁康液化气有限公司", "lon": 109.61, "lat": 34.948, "type": "液化气", "visited": true}, {"name": "中国石油领航加油加气站", "lon": 109.524, "lat": 35.008, "type": "天然气", "visited": false}, {"name": "延长壳牌蒲大路加气站", "lon": 109.696, "lat": 34.91, "type": "天然气", "visited": true}, {"name": "延长壳牌五陵路分公司", "lon": 109.6, "lat": 34.97, "type": "天然气", "visited": true}, {"name": "渭南蒲城华气新能源有限公司", "lon": 109.648, "lat": 35.05, "type": "天然气", "visited": false}, {"name": "蒲城五原石油气化有限公司", "lon": 109.57, "lat": 34.925, "type": "天然气", "visited": false}, {"name": "蒲城县中天洋天然气有限责任公司", "lon": 109.586, "lat": 34.955, "type": "天然气", "visited": true}, {"name": "蒲城县中能加气站有限公司", "lon": 109.491, "lat": 34.899, "type": "天然气", "visited": false}, {"name": "蒲城县兴盛加气有限公司", "lon": 109.686, "lat": 34.84, "type": "天然气", "visited": false}, {"name": "蒲城县沣源油业有限公司", "lon": 109.433, "lat": 34.955, "type": "天然气", "visited": false}, {"name": "环城燃气北环路加气站", "lon": 109.596, "lat": 34.97, "type": "天然气", "visited": false}, {"name": "环城燃气城南新区加气站", "lon": 109.578, "lat": 34.933, "type": "天然气", "visited": true}, {"name": "蒲城宏远城镇天然气有限公司", "lon": 109.811, "lat": 34.956, "type": "天然气", "visited": true}, {"name": "蒲城民东新能源有限公司", "lon": 109.578, "lat": 34.956, "type": "天然气", "visited": true}, {"name": "蒲城隆丰天然气有限公司", "lon": 109.69, "lat": 34.895, "type": "天然气", "visited": false}];
        
        // 循环添加标注点
        gasData.forEach(function(item) {
            var icon = createIcon(item.type, item.visited);
            var statusClass = item.visited ? 'visited' : 'unvisited';
            var statusText = item.visited ? '✅ 已完成摸排' : '⭕ 待摸排';
            
            var popupContent = '<div class="popup-title">' + item.name + '</div>' +
                               '<div class="popup-status ' + statusClass + '">' + statusText + '</div>' +
                               '<div class="popup-type">气源类型：' + item.type + '</div>';
            
            L.marker([item.lat, item.lon], {icon: icon})
             .bindPopup(popupContent)
             .addTo(map);
        });

        // 添加图例控制
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML = '<strong>图例说明</strong><br>' +
                            '<div class="legend-item"><div class="legend-icon diamond green-bg"></div>天然气 - 已摸排</div>' +
                            '<div class="legend-item"><div class="legend-icon diamond red-bg"></div>天然气 - 待摸排</div>' +
                            '<div class="legend-item"><div class="legend-icon circle green-bg"></div>液化气 - 已摸排</div>' +
                            '<div class="legend-item"><div class="legend-icon circle red-bg"></div>液化气 - 待摸排</div>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
